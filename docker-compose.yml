services:
  postgres:
    image: postgres:16

    container_name: chat-postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: chat_app_db
      POSTGRES_USER: ramanmalviya
      POSTGRES_PASSWORD: mypassword

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: chat-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

volumes:
  postgres_data: